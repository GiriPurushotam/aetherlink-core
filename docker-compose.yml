services:
  # ============================================================================
  # Application Server Layer (FrankenPHP 8.4)
  # ============================================================================
  aether_app:
    build:
      context: .
      dockerfile: ./infrastructure/docker/frankenphp/Dockerfile
    container_name: aether_app
    restart: unless-stopped
    ports:
      - "${FRANKENPHP_PORT:-80}:80"
      - "${FRANKENPHP_HTTPS_PORT:-443}:443"
      - "${FRANKENPHP_HTTPS_PORT:-443}:443/udp" # HTTP/3 Requirement
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}

    networks:
      - aether_public
      - aether_private
    depends_on:
      aether_db:
        condition: service_healthy
      aether_redis:
        condition: service_healthy

  # ============================================================================
  # Database Storage Layer (PostgreSQL 17)
  # ============================================================================
  aether_db:
    image: postgres:17-alpine
    container_name: aether_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-aetherlink_dev}
      POSTGRES_USER: ${DB_USERNAME:-aether_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret_development_password}
    volumes:
      - ./infrastructure/docker/postgres/data:/var/lib/postgresql/data
    networks:
      - aether_private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Caching & Streaming Layer (Redis 7.4)
  # ============================================================================
  aether_redis:
    image: redis:7.4-alpine
    container_name: aether_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret_development_password}
    volumes:
      - ./infrastructure/docker/redis/data:/data
    networks:
      - aether_private
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret_development_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

# ==============================================================================
# Isolated Network Topologies
# ==============================================================================
networks:
  aether_public:
    name: aether_public
    driver: bridge
  aether_private:
    name: aether_private
    driver: bridge